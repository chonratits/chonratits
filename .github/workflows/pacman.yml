name: Generate Pac-Man Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Pac-Man SVG
        uses: Platane/snk@v3
        with:
          github_user_name: chonratits
          outputs: |
            dist/pacman.svg?type=pacman&color_snake=#FFD700&color_dots=#7c3aed,#6d28d9,#5b21b6
            dist/pacman-dark.svg?type=pacman&color_snake=#FFD700&color_dots=#7c3aed,#6d28d9,#5b21b6&color_empty=#0d1117

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
